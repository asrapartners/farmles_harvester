name: Deploy test fixtures to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["tests/fixtures/sites/**"]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: tests/fixtures/sites/
      - uses: actions/deploy-pages@v4
        id: deployment
