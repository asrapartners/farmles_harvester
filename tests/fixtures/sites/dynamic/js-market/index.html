<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Greenfield Market</title>
</head>
<body>
  <div id="app"></div>
  <script>
    document.getElementById('app').innerHTML = `
      <header>
        <h1>Greenfield Farmers Market</h1>
        <nav>
          <a href="/vendors">Vendors</a>
          <a href="/hours">Hours &amp; Location</a>
          <a href="/events">Events</a>
        </nav>
      </header>
      <main>
        <section>
          <h2>Welcome to Greenfield Farmers Market</h2>
          <p>Every Saturday from April through November, Greenfield Farmers Market brings together over fifty local vendors offering the finest seasonal produce, artisan breads, farmstead cheeses, and handcrafted goods from across the region.</p>
          <p>Our mission is to strengthen the connection between local farmers and the communities they serve. We believe that knowing where your food comes from makes every meal more meaningful.</p>
        </section>
        <section>
          <h2>Market Hours</h2>
          <p>Open every Saturday from 8 AM to 1 PM, located at 200 Greenfield Plaza, downtown. Free parking is available in the adjacent municipal garage. We are open rain or shine throughout the season.</p>
        </section>
        <section>
          <h2>Featured Vendors</h2>
          <ul>
            <li><strong>Sunrise Organics</strong> — certified organic vegetables and herbs grown without synthetic pesticides</li>
            <li><strong>Valley Bread Co.</strong> — wood-fired sourdough, rye loaves, and seasonal pastries baked fresh each week</li>
            <li><strong>Clover Hill Dairy</strong> — fresh whole milk, cultured butter, and aged cheddar from grass-fed cows</li>
            <li><strong>Riverbend Honey</strong> — raw wildflower honey, creamed honey, and beeswax candles from local hives</li>
          </ul>
        </section>
        <section>
          <h2>Upcoming Events</h2>
          <p>Join us for our annual Harvest Festival on the last Saturday of October featuring live bluegrass music, cooking demonstrations by local chefs, and special vendor discounts. Children's activities including face painting and pumpkin decorating run from 9 AM to noon.</p>
        </section>
      </main>
    `;
  </script>
</body>
</html>
